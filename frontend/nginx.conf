server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Reverse proxy API to backend service so browser uses same-origin /api paths.
  location /api/ {
    proxy_pass https://self-management-api.zeabur.app/;
    proxy_http_version 1.1;
    proxy_ssl_server_name on;

    proxy_set_header Host self-management-api.zeabur.app;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /api {
    return 301 /api/;
  }

  location /health {
    return 200 "ok";
    add_header Content-Type text/plain;
  }
}
